name: Auto MPG MLOps Pipeline

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy joblib pyyaml dvc dvc-s3 boto3

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
        run: |
          dvc remote modify myremote region ap-south-1

      - name: DVC pull
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
        run: dvc pull

      - name: Run pipeline
        run: |
          python src/preprocess.py
          python src/train.py

      - name: Show metrics
        run: cat metrics/metrics.json